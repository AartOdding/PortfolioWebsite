{{ define "main" }}

    <div class="container">

        <div style="padding-bottom: 2%"></div>

        <div class="row">
            <div class="col-md-8">

{{ range sort (where .Data.Pages "Section" "resume") "Params.rank" "desc" }}

                <h2>{{ .Title }}</h2>
                <p class="resume-meta">{{ .Params.company }} &nbsp;·&nbsp; {{ .Params.dates }}</p>
                {{ .Content }}

                <div style="padding-bottom: 6%"></div>

{{ end }}

            </div>
        </div>

    </div>

{{ end }}
